<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProMold Expert Calculators</title>
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#07090f" />
    
    <!-- Open Graph for better identification -->
    <meta property="og:title" content="ProMold Expert" />
    <meta property="og:description" content="Professional mold design suite." />
    <meta property="og:image" content="/icon-512.png" />

    <!-- Apple Specific -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ProMold" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw-v4.js')
            .then(reg => {
              console.log('Service Worker registered', reg);
              // Force update checking
              reg.update();
            })
            .catch(err => console.error('Service Worker registration failed', err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
